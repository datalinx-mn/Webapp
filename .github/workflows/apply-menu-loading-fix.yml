name: Apply nonblocking menu loading fix

on:
  push:
    branches:
      - fix/nonblocking-menu-loading
    paths:
      - scripts/apply_menu_loading_fix.py
      - .github/workflows/apply-menu-loading-fix.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/nonblocking-menu-loading

      - name: Apply patch
        run: python scripts/apply_menu_loading_fix.py

      - name: Validate embedded JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          blocks = re.findall(r'<script>(.*?)</script>', html, flags=re.S)
          Path('/tmp/index-inline.js').write_text('\n'.join(blocks), encoding='utf-8')
          PY
          node --check /tmp/index-inline.js

      - name: Commit patched index
        run: |
          if git diff --quiet -- index.html; then
            echo "No index.html changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Make menu module loading non-blocking"
          git push origin HEAD:fix/nonblocking-menu-loading
