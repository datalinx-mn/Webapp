name: Apply mobile barcode scanner feature

on:
  push:
    branches:
      - feature/mobile-barcode-scanner
    paths:
      - scripts/apply_mobile_barcode_scanner.py
      - .github/workflows/apply-mobile-barcode-scanner.yml

permissions:
  contents: write

jobs:
  apply-feature:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/mobile-barcode-scanner

      - name: Apply patch
        run: python scripts/apply_mobile_barcode_scanner.py

      - name: Validate embedded JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          blocks = re.findall(r'<script>(.*?)</script>', html, flags=re.S)
          Path('/tmp/index-inline.js').write_text('\n'.join(blocks), encoding='utf-8')
          PY
          node --check /tmp/index-inline.js

      - name: Validate expected scanner elements
        run: |
          grep -q 'id="barcodeModal"' index.html
          grep -q 'data-barcode-target="sale"' index.html
          grep -q 'data-barcode-target="inventory"' index.html
          grep -q 'data-barcode-target="product"' index.html
          grep -q 'function openBarcodeScanner' index.html

      - name: Commit patched index
        run: |
          if git diff --quiet -- index.html; then
            echo "No index.html changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add mobile barcode scanning for sales and inventory"
          git push origin HEAD:feature/mobile-barcode-scanner
