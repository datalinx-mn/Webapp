name: Apply product management UI

on:
  push:
    branches:
      - feature/product-management
    paths:
      - '.codex/apply_product_management.py'
      - '.github/workflows/apply-product-management.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/product-management
          fetch-depth: 0

      - name: Apply product management changes
        run: python .codex/apply_product_management.py

      - name: Validate embedded JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>', html, re.S)
          Path('/tmp/index-inline.js').write_text('\n'.join(scripts), encoding='utf-8')
          PY
          node --check /tmp/index-inline.js

      - name: Commit generated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add manager product management section"
            git push origin HEAD:feature/product-management
          fi
